version: '3.8'

services:
  mongodb:
    image: mongo:7.0-jammy
    container_name: saas-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: saas-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-b2b_saas_platform_secret_key_extremely_long_256_bits}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
      - MONGO_URI=mongodb://mongodb:27017/slacknotion
      - REDIS_URI=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: saas-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
